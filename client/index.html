<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/hansol.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>hansol_ax</title>
    <!-- 디자인 폰트: 한글(Pretendard) + 영문/태그라인(Inter, Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@300;500;600;700&display=swap"
    />
    <script>
      // 페인트 전에 테마를 적용해 다크/라이트 깜빡임을 방지.
      // 저장된 값이 없으면 OS 설정을 따른다.
      (function () {
        var saved = localStorage.getItem('theme');
        var dark = saved
          ? saved === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = dark ? 'dark' : 'light';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
