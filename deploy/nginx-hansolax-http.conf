# 인증서 발급 중 사용하는 HTTP 설정 (ACME 챌린지 + 8100 프록시).
# setup-ssl.sh 가 발급 후 nginx-hansolax-ssl.conf 로 교체한다.
upstream hansolax_backend {
    server 127.0.0.1:8100;
}

server {
    listen 80;
    listen [::]:80;
    server_name hansolax.kro.kr;

    # ZeroSSL/Let's Encrypt 인증 챌린지 (호스트가 직접 응답)
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
    }

    location / {
        proxy_pass http://hansolax_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
