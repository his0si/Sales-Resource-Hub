# 최종 HTTPS 설정. hansolax.kro.kr 요청을 web 컨테이너(127.0.0.1:8100)로 프록시.
# 인증서는 acme.sh(ZeroSSL)가 /etc/nginx/ssl/hansolax.kro.kr/ 에 설치/갱신한다.
upstream hansolax_backend {
    server 127.0.0.1:8100;
}

# HTTP -> HTTPS 리다이렉트 (+ 인증서 갱신 챌린지 유지)
server {
    listen 80;
    listen [::]:80;
    server_name hansolax.kro.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hansolax.kro.kr;

    ssl_certificate     /etc/nginx/ssl/hansolax.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/hansolax.kro.kr/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://hansolax_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
